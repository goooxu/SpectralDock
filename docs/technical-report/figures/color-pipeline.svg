<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 650" role="img" aria-labelledby="title desc">
  <title id="title">SpectralDock HDR AVIF 颜色处理管线</title>
  <desc id="desc">八位 SDR AVIF 颜色与数据纹理、十或十二位 PQ HDR 自发光纹理解码到线性 Rec.709 后进入路径积分；样本平均后可选 OptiX HDR 降噪，浮点 beauty 回传主机，再严格按介于负一百二十八和正一百二十八 EV 的有限曝光缩放，然后经过 Rec.2020 转换、保色相亮度肩部、PQ、十位四比四比四量化和无损 AV1 编码；非有限或越界 EV 直接失败。</desc>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#93c5fd"/></marker>
    <style>.h{font:700 21px system-ui,sans-serif;fill:#f8fafc}.t{font:15px system-ui,sans-serif;fill:#dbeafe}.s{font:13px system-ui,sans-serif;fill:#93c5fd}.b{fill:#102b46;stroke:#60a5fa;stroke-width:2}.o{fill:#164e63;stroke:#22d3ee;stroke-width:2}.line{stroke:#93c5fd;stroke-width:2.5;marker-end:url(#arr)}</style>
  </defs>
  <rect width="1180" height="650" rx="18" fill="#07111f"/>

  <text x="34" y="48" class="h">输入与积分：线性 Rec.709 RGB</text>
  <rect x="34" y="76" width="186" height="76" rx="12" class="b"/><text x="73" y="101" class="t">AVIF 纹理</text><text x="53" y="122" class="s">8 bit SDR 颜色/数据</text><text x="44" y="142" class="s">10–12 bit PQ HDR 自发光</text>
  <rect x="258" y="76" width="190" height="76" rx="12" class="b"/><text x="297" y="106" class="t">线性路径积分</text><text x="283" y="132" class="s">BSDF、光照、throughput</text>
  <rect x="486" y="76" width="210" height="76" rx="12" class="b"/><text x="505" y="106" class="t">direct/indirect 贡献钳位</text><text x="512" y="132" class="s">阈值 0 禁用；非零有偏</text>
  <rect x="734" y="76" width="168" height="76" rx="12" class="b"/><text x="780" y="106" class="t">spp 平均</text><text x="762" y="132" class="s">float HDR beauty</text>
  <rect x="940" y="76" width="206" height="76" rx="12" class="b"/><text x="966" y="106" class="t">可选 OptiX 降噪</text><text x="970" y="132" class="s">albedo + normal guide</text>
  <line x1="220" y1="114" x2="258" y2="114" class="line"/><line x1="448" y1="114" x2="486" y2="114" class="line"/><line x1="696" y1="114" x2="734" y2="114" class="line"/><line x1="902" y1="114" x2="940" y2="114" class="line"/>

  <text x="34" y="212" class="h">主机 HDR 映射：固定、保色相</text>
  <rect x="34" y="240" width="150" height="76" rx="12" class="b"/><text x="64" y="270" class="t">float RGB D2H</text><text x="58" y="296" class="s">原始或 denoised</text>
  <rect x="222" y="240" width="132" height="76" rx="12" class="b"/><text x="266" y="263" class="t">曝光</text><text x="236" y="287" class="s">−128 ≤ EV ≤ 128</text><text x="257" y="307" class="s">× 2ᴱⱽ</text>
  <rect x="392" y="240" width="188" height="76" rx="12" class="b"/><text x="418" y="270" class="t">Rec.709 → Rec.2020</text><text x="421" y="296" class="s">线性 primaries 矩阵</text>
  <rect x="618" y="240" width="222" height="76" rx="12" class="b"/><text x="643" y="270" class="t">max-RGB soft shoulder</text><text x="647" y="296" class="s">203 nit white / 1000 nit peak</text>
  <rect x="878" y="240" width="126" height="76" rx="12" class="b"/><text x="916" y="270" class="t">ST 2084</text><text x="923" y="296" class="s">PQ</text>
  <rect x="1042" y="240" width="104" height="76" rx="12" class="b"/><text x="1065" y="270" class="t">BT.2020</text><text x="1067" y="296" class="s">NCL YUV</text>
  <line x1="184" y1="278" x2="222" y2="278" class="line"/><line x1="354" y1="278" x2="392" y2="278" class="line"/><line x1="580" y1="278" x2="618" y2="278" class="line"/><line x1="840" y1="278" x2="878" y2="278" class="line"/><line x1="1004" y1="278" x2="1042" y2="278" class="line"/>
  <path d="M1043 152 L1043 188 L109 188 L109 240" fill="none" class="line"/>

  <text x="34" y="376" class="h">编码：唯一持久图像输出</text>
  <rect x="166" y="404" width="220" height="82" rx="12" class="b"/><text x="198" y="436" class="t">10 bit YUV 4:4:4 full</text><text x="210" y="462" class="s">每像素三平面量化</text>
  <rect x="480" y="404" width="220" height="82" rx="12" class="b"/><text x="520" y="436" class="t">AOM AV1 lossless</text><text x="510" y="462" class="s">量化后码值无损压缩</text>
  <rect x="794" y="404" width="220" height="82" rx="12" class="o"/><text x="858" y="436" class="t">HDR AVIF</text><text x="826" y="462" class="s">CICP 9/16/9 + CLLI</text>
  <path d="M1094 316 L1094 354 L276 354 L276 404" fill="none" class="line"/>
  <line x1="386" y1="445" x2="480" y2="445" class="line"/><line x1="700" y1="445" x2="794" y2="445" class="line"/>

  <rect x="34" y="530" width="1112" height="86" rx="14" fill="#0b1728" stroke="#284565"/>
  <text x="58" y="565" class="h">固定输出契约</text>
  <text x="58" y="595" class="t">每次 render 都写单帧 HDR AVIF；无 SDR 或公共线性文件分支。AV1 lossless 不消除 float → 10 bit 的量化。</text>
</svg>
