<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 590" role="img" aria-labelledby="title desc">
  <title id="title">SpectralDock 颜色处理管线</title>
  <desc id="desc">sRGB 纹理解码或线性输入进入路径积分，经样本平均后可直接导出原始线性 PFM，展示分支则经过可选降噪、曝光、色调映射、sRGB 编码和八位 PNG。</desc>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#93c5fd"/></marker>
    <style>.h{font:700 21px system-ui,sans-serif;fill:#f8fafc}.t{font:15px system-ui,sans-serif;fill:#dbeafe}.s{font:13px system-ui,sans-serif;fill:#93c5fd}.b{fill:#102b46;stroke:#60a5fa;stroke-width:2}.line{stroke:#93c5fd;stroke-width:2.5;marker-end:url(#arr)}</style>
  </defs>
  <rect width="1180" height="590" rx="18" fill="#07111f"/>
  <text x="34" y="48" class="h">输入与积分：保持线性</text>
  <rect x="34" y="82" width="168" height="76" rx="12" class="b"/><text x="62" y="112" class="t">sRGB 纹理</text><text x="52" y="138" class="s">分段函数解码</text>
  <rect x="246" y="82" width="190" height="76" rx="12" class="b"/><text x="285" y="112" class="t">线性 RGB 路径积分</text><text x="274" y="138" class="s">BSDF、光照、throughput</text>
  <rect x="480" y="82" width="154" height="76" rx="12" class="b"/><text x="510" y="112" class="t">spp 平均</text><text x="502" y="138" class="s">浮点 HDR beauty</text>
  <line x1="202" y1="120" x2="246" y2="120" class="line"/><line x1="436" y1="120" x2="480" y2="120" class="line"/>
  <rect x="704" y="82" width="190" height="76" rx="12" fill="#164e63" stroke="#22d3ee" stroke-width="2"/><text x="739" y="112" class="t">可选线性 PFM</text><text x="724" y="138" class="s">raw、float32、bottom-up</text>
  <line x1="634" y1="120" x2="704" y2="120" class="line"/>
  <rect x="34" y="174" width="168" height="54" rx="12" class="b"/><text x="48" y="196" class="t">线性纹理 / 常量 / 背景</text><text x="64" y="218" class="s">无需 sRGB 解码</text>
  <path d="M202 201 L224 201 L224 145 L246 145" fill="none" class="line"/>

  <text x="34" y="240" class="h">重建与显示：平均之后才进行非线性变换</text>
  <rect x="34" y="276" width="154" height="76" rx="12" class="b"/><text x="61" y="306" class="t">可选 HDR 降噪</text><text x="53" y="332" class="s">albedo + normal guide</text>
  <rect x="232" y="276" width="146" height="76" rx="12" class="b"/><text x="274" y="306" class="t">曝光</text><text x="274" y="332" class="s">× 2ᴱⱽ</text>
  <rect x="422" y="276" width="186" height="76" rx="12" class="b"/><text x="451" y="306" class="t">ACES 风格拟合</text><text x="460" y="332" class="s">逐通道压缩 HDR</text>
  <rect x="652" y="276" width="166" height="76" rx="12" class="b"/><text x="686" y="306" class="t">sRGB 编码</text><text x="677" y="332" class="s">精确分段函数</text>
  <rect x="862" y="276" width="150" height="76" rx="12" class="b"/><text x="903" y="306" class="t">量化</text><text x="884" y="332" class="s">round 到 0…255</text>
  <rect x="1056" y="276" width="92" height="76" rx="12" fill="#164e63" stroke="#22d3ee" stroke-width="2"/><text x="1078" y="306" class="t">PNG</text><text x="1068" y="332" class="s">RGBA8</text>
  <line x1="188" y1="314" x2="232" y2="314" class="line"/><line x1="378" y1="314" x2="422" y2="314" class="line"/><line x1="608" y1="314" x2="652" y2="314" class="line"/><line x1="818" y1="314" x2="862" y2="314" class="line"/><line x1="1012" y1="314" x2="1056" y2="314" class="line"/>
  <path d="M557 158 L557 212 L111 212 L111 276" fill="none" class="line"/>
  <text x="116" y="252" class="s">denoise = true</text>
  <path d="M557 158 L634 158 L634 382 L305 382 L305 352" fill="none" class="line"/>
  <text x="500" y="402" class="s">denoise = false，直接进入曝光</text>

  <rect x="34" y="416" width="1114" height="128" rx="14" fill="#0b1728" stroke="#284565"/>
  <text x="58" y="450" class="h">四个经常混淆的操作</text>
  <text x="58" y="486" class="t">降噪：根据邻域和 guide 估计较低噪声的 HDR 图像，不是增加样本。</text>
  <text x="58" y="514" class="t">色调映射：把大于 1 的 HDR 亮度平滑压到显示范围，不是 sRGB gamma。</text>
  <text x="652" y="486" class="t">sRGB 编码：为显示保存非线性码值，不是物理光照计算。</text>
  <text x="652" y="514" class="t">量化：丢弃精度以得到 8 bit 文件；之前应一直保留浮点线性值。</text>
  <text x="58" y="538" class="s">PFM 导出：保留原始样本均值供测量，不经过降噪或显示变换。</text>
</svg>
