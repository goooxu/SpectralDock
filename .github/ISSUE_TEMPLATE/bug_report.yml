name: Bug report
description: 报告可复现的构建、场景或渲染问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢报告。安全漏洞请使用 Security 页面的私有漏洞报告，不要在此披露。
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 说明预期行为和实际行为。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 最小复现步骤
      description: 包含场景、命令和最小输入；请删除敏感信息。
      placeholder: |
        1. 使用场景 ...
        2. 运行命令 ...
        3. 观察到 ...
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: SpectralDock 版本或 commit
      placeholder: v0.1.0 或完整 commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: OS、容器镜像、GPU、驱动、CUDA、OptiX 和构建类型。
      placeholder: |
        OS:
        Container:
        GPU / driver:
        CUDA / OptiX:
        Release or Debug:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志
      description: 粘贴最小相关日志；不要包含凭据或内部路径。
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我确认这不是安全漏洞；安全问题将通过私有漏洞报告提交。
          required: true
        - label: 我已搜索现有 issue，并移除了凭据和敏感信息。
          required: true
