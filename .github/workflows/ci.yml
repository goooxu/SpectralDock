name: CPU CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Ubuntu 24.04 CPU
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libpng-dev \
            ninja-build \
            nlohmann-json3-dev \
            python3 \
            python3-pil \
            python3-pytest

      - name: Check shell syntax
        run: bash -n scripts/*.sh

      - name: Configure CPU build
        run: |
          cmake -S . -B build/cpu-ci -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DSPECTRALDOCK_ENABLE_GPU=OFF

      - name: Build CPU tests
        run: cmake --build build/cpu-ci --parallel

      - name: Run CTest
        run: ctest --test-dir build/cpu-ci --output-on-failure

      - name: Run Python tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 -m pytest -q -p no:cacheprovider tests
