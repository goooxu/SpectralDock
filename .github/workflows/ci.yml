name: Host checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Ubuntu 24.04 host
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libpng-dev \
            ninja-build \
            python3 \
            python3-dev \
            python3-pil \
            pybind11-dev \
            python3-pytest

      - name: Run host checks
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: bash scripts/test.sh build/host-ci
